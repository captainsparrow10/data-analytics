services:
  # El contenedor donde vas a programar
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
    network_mode: service:db # Hace que compartan la misma red fácilmente
    command: sleep infinity

  # El contenedor de tu Base de Datos
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: sparrow
      POSTGRES_PASSWORD: 1009
      POSTGRES_DB: data_analysis_db
    # Sin "ports": la DB NO se publica en el host, así no choca con nada que
    # cada quien tenga local. Desde el contenedor app (network_mode: service:db)
    # se accede en localhost:5432 igual que siempre. Si alguna vez querés
    # conectarte desde tu máquina, agregá: ports: ["5433:5432"].
